name: Tests

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run test suite
        run: python -m pytest tests -q
