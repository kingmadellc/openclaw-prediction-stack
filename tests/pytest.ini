[pytest]
# OpenClaw Prediction Stack Test Configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    blocklist: Kalshalyst blocklist filtering tests
    json_parsing: JSON parsing utility tests
    kelly: Kelly Criterion position sizing tests
    signal_filter: Signal filter verification tests
    integration: Integration tests combining multiple components
    slow: Slow running tests
    unit: Unit tests

# Coverage (optional)
# testpaths = .
# Minimum Python version
minversion = 3.8
